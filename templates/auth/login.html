{% extends 'base.html' %}
{% block title %}Войти — Электронная библиотека{% endblock %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height:65vh">
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="mb-2" style="font-size:2.5rem;color:var(--purple-light)"><i class="bi bi-book-half"></i></div>
      <h1 class="h4 fw-bold text-white mb-1">Вход в систему</h1>
      <p class="text-secondary mb-0" style="font-size:.875rem">Войдите, чтобы пользоваться всеми функциями</p>
    </div>

    <form method="post" action="{{ url_for('auth.login') }}" novalidate>
      <div class="mb-3">
        <label class="form-label" for="login_field">Логин</label>
        <div class="input-group">
          <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-person"></i></span>
          <input id="login_field" name="login" type="text" class="form-control"
                 placeholder="Введите логин"
                 value="{{ request.form.get('login', '') }}" required autofocus>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="password_field">Пароль</label>
        <div class="input-group">
          <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-lock"></i></span>
          <input id="password_field" name="password" type="password" class="form-control"
                 placeholder="Введите пароль" required>
          <button class="input-group-text bg-dark border-secondary text-secondary" type="button"
                  onclick="togglePassword()"><i class="bi bi-eye" id="pwdIcon"></i></button>
        </div>
      </div>

      <div class="mb-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="remember" id="remember">
          <label class="form-check-label text-secondary" for="remember">Запомнить меня</label>
        </div>
      </div>

      <button type="submit" class="btn btn-purple w-100">
        <i class="bi bi-box-arrow-in-right me-1"></i>Войти
      </button>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function togglePassword() {
  const f = document.getElementById('password_field');
  const i = document.getElementById('pwdIcon');
  if (f.type === 'password') { f.type = 'text'; i.className = 'bi bi-eye-slash'; }
  else { f.type = 'password'; i.className = 'bi bi-eye'; }
}
</script>
{% endblock %}
